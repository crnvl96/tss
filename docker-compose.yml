services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: tss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tss}
      POSTGRES_DB: ${POSTGRES_DB:-tss}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tss-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tss-pgdata:
